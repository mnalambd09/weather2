<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রো ওয়েদার অ্যাপ</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #00feba, #5b548a);
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 90%;
            max-width: 420px;
            text-align: center;
            color: #ffffff;
        }

        .search {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            margin-top: 15px;
        }

        .search input {
            padding: 12px 15px;
            border: none;
            border-radius: 25px 0 0 25px;
            outline: none;
            width: 70%;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .search button {
            padding: 12px 20px;
            border: none;
            background: #ff6b6b;
            color: #fff;
            border-radius: 0 25px 25px 0;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            font-weight: 600;
        }

        .search button:hover {
            background: #ff4757;
        }

        .weather-info {
            display: none; 
            margin-top: 20px;
        }

        .weather-info h2 {
            font-size: 30px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .temp {
            font-size: 55px;
            font-weight: 700;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .desc {
            font-size: 20px;
            text-transform: capitalize;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .details {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.1);
            padding: 15px;
            border-radius: 15px;
        }

        .message {
            font-weight: 600;
            display: none;
            margin-top: 15px;
            font-size: 15px;
        }

        .error { color: #ffcccc; }
        .loading { color: #e1f5fe; }

        /* Current Location Badge */
        .location-badge {
            font-size: 12px;
            background: #1e90ff;
            padding: 3px 10px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>আবহাওয়া ☁️</h1>
        
        <div class="search">
            <input type="text" id="city" placeholder="শহরের নাম (যেমন: Dhaka)">
            <button onclick="searchByCity()">খুঁজুন</button>
        </div>
        
        <div class="message error" id="error">শহর পাওয়া যায়নি! আবার চেষ্টা করুন।</div>
        <div class="message loading" id="loading">লোকেশন খোঁজা হচ্ছে... ⏳</div>
        
        <div class="weather-info" id="weather">
            <div class="location-badge" id="auto-badge">📍 আপনার বর্তমান এলাকা</div>
            <br>
            <img id="weather-icon" src="" alt="Weather Icon" width="120">
            <h2 id="city-name">City Name</h2>
            <div class="temp"><span id="temp-val">0</span>°C</div>
            <div class="desc" id="description">Weather Desc</div>
            
            <div class="details">
                <div>💧 আর্দ্রতা:<br> <strong id="humidity">0</strong>%</div>
                <div>💨 বাতাস:<br> <strong id="wind">0</strong> km/h</div>
            </div>
        </div>
    </div>

    <script>
        // আপনার OpenWeatherMap API Key এখানে বসান
        const apiKey = "https://api.openweathermap.org/data/2.5/weather?q={city name},{country code}&appid={API key}"; 

        // API থেকে ডেটা এনে ওয়েবসাইটে দেখানোর মূল ফাংশন
        async function fetchWeather(url, isAutoLocation = false) {
            document.getElementById("loading").style.display = "block";
            document.getElementById("weather").style.display = "none";
            document.getElementById("error").style.display = "none";

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("City not found");
                
                const data = await response.json();

                // ডেটা HTML এ সেট করা
                document.getElementById("city-name").innerText = data.name;
                document.getElementById("temp-val").innerText = Math.round(data.main.temp);
                document.getElementById("humidity").innerText = data.main.humidity;
                document.getElementById("wind").innerText = data.wind.speed;
                document.getElementById("description").innerText = data.weather[0].description;
                
                // আইকন সেট করা
                const iconCode = data.weather[0].icon;
                document.getElementById("weather-icon").src = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;

                // অটোমেটিক লোকেশন হলে 📍 ব্যাজ দেখাবে
                if(isAutoLocation){
                    document.getElementById("auto-badge").style.display = "inline-block";
                } else {
                    document.getElementById("auto-badge").style.display = "none";
                }

                // লোডিং সরিয়ে ওয়েদার ডেটা দেখানো
                document.getElementById("loading").style.display = "none";
                document.getElementById("weather").style.display = "block";

            } catch (error) {
                document.getElementById("loading").style.display = "none";
                document.getElementById("error").style.display = "block";
            }
        }

        // ১. শহরের নাম দিয়ে খোঁজার ফাংশন (সার্চ বক্স)
        function searchByCity() {
            const city = document.getElementById("city").value;
            if(city === "") return;
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;
            fetchWeather(url, false);
        }

        // ২. অটোমেটিক GPS লোকেশন দিয়ে খোঁজার ফাংশন
        function getAutoLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        // ইউজার লোকেশন পারমিশন দিলে (lat & lon API কাজ করবে)
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`;
                        fetchWeather(url, true);
                    },
                    (error) => {
                        // ইউজার লোকেশন পারমিশন না দিলে ডিফল্টভাবে 'Dhaka' এর আবহাওয়া দেখাবে
                        const url = `https://api.openweathermap.org/data/2.5/weather?q=Dhaka&units=metric&appid=${apiKey}`;
                        fetchWeather(url, false);
                    }
                );
            } else {
                alert("আপনার ব্রাউজার লোকেশন সাপোর্ট করে না!");
            }
        }

        // ওয়েবসাইট লোড হওয়ার সাথে সাথেই অটোমেটিক লোকেশন চেক করবে
        window.addEventListener('load', getAutoLocation);

    </script>
</body>
</html>
